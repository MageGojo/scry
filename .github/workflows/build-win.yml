name: build-win

# Windows 版必须在 Windows 上原生构建(macOS 无法交叉编译:gpui_windows release 着色器要
# Windows 专有 fxc.exe + 其 build.rs 按宿主 cfg 求值)。这条流水线在 GitHub 的 windows-latest
# 上原生出包,你无需拥有 Windows 机器:手动触发(Actions 页 Run workflow)或打 tag 即可。

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # aws-lc-rs(经 drission→reqwest→rustls 引入)在 Windows 上需要 NASM 编译汇编。
      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      # pcap crate(被动嗅探 scry_sniff)链接期需要 Npcap SDK 的 wpcap.lib / Packet.lib。
      - name: Install Npcap SDK
        shell: pwsh
        run: |
          $url = "https://npcap.com/dist/npcap-sdk-1.13.zip"
          Invoke-WebRequest $url -OutFile npcap-sdk.zip
          Expand-Archive npcap-sdk.zip -DestinationPath npcap-sdk
          $lib = (Resolve-Path "npcap-sdk\Lib\x64").Path
          "LIB=$lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

      # gpui_windows release 着色器编译需要 fxc.exe —— windows-latest 自带 Windows SDK,
      # gpui 的 build.rs 会从注册表/where.exe 找到它;如未找到可设 GPUI_FXC_PATH。

      - name: Build release
        run: cargo build --release -p scry_app
        env:
          CARGO_TERM_COLOR: always

      - name: Package (zero-env, 自带 VC++ 运行时)
        shell: pwsh
        run: pwsh -File scripts/build_win.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scry-win
          path: dist/Scry-win.zip
          if-no-files-found: error
